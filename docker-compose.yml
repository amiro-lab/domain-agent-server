services:
  server:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - domain_agent_data:/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////data/domain_agent.db
      - TZ=Asia/Seoul
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  domain_agent_data:
