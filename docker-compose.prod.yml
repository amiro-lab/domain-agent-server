services:
  server:
    build: .
    expose:
      - "8000"
    volumes:
      - domain_agent_data:/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////data/domain_agent.db
      - TZ=Asia/Seoul
      - JANITOR_ENABLED=true
      - JANITOR_DRY_RUN=false
      - JANITOR_CAP_RATIO=0.05
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - server
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      sh -c "certbot certonly --webroot -w /var/www/certbot
      --email YOUR_EMAIL --agree-tos --no-eff-email
      -d YOUR_DOMAIN && echo ok"
    profiles:
      - certbot

volumes:
  domain_agent_data:
  certbot_webroot:
